title: Manoj Bhat
description: ML & AI Scientist — Autonomous Vehicles, Robotics, Computer Vision
url: "https://manojbhat09.github.io"
baseurl: ""

author:
  name: Manoj Bhat
  email: manojbhat.research@gmail.com
  twitter: ManojBhat711
  github: manojbhat09
  scholar: SKWv3BcAAAAJ

markdown: kramdown
highlighter: rouge
permalink: /blog/:year/:month/:day/:title/

kramdown:
  input: GFM
  syntax_highlighter: rouge
  syntax_highlighter_opts:
    default_lang: python
    block:
      line_numbers: true

defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: post

plugins:
  - jekyll-feed
  - jekyll-seo-tag

exclude:
  - README.md
  - resume_la.tex
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor
  - "**/*.Zone.Identifier"
